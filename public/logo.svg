<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003c96;stop-opacity:1" />
    </linearGradient>
    <filter id="f1" x="0" y="0" width="200%" height="200%">
      <feOffset result="offOut" in="SourceAlpha" dx="10" dy="10" />
      <feGaussianBlur result="blurOut" in="offOut" stdDeviation="10" />
      <feBlend in="SourceGraphic" in2="blurOut" mode="normal" />
    </filter>
  </defs>
  
  <!-- Map Base Card -->
  <rect x="40" y="40" width="432" height="432" rx="80" fill="#f8fafc" />
  <rect x="60" y="60" width="392" height="392" rx="60" fill="#e2e8f0" />
  
  <!-- Map Layout -->
  <path d="M60 200 Q 250 250 452 180" stroke="#fcd34d" stroke-width="40" fill="none" stroke-linecap="round" />
  <path d="M150 60 L 150 452" stroke="#cbd5e1" stroke-width="30" fill="none" />
  <path d="M350 60 L 350 452" stroke="#cbd5e1" stroke-width="30" fill="none" />
  <rect x="60" y="300" width="90" height="152" fill="#86efac" opacity="0.5" />
  
  <!-- The Blue Diamond (Plumbob) -->
  <g filter="url(#f1)">
    <path d="M256 60 L 336 216 L 256 452 L 176 216 Z" fill="url(#diamondGrad)" stroke="#ffffff" stroke-width="4" />
    <path d="M256 60 L 336 216 L 256 256 L 176 216 Z" fill="#ffffff" opacity="0.2" />
    <path d="M256 256 L 336 216 L 256 452 Z" fill="#000000" opacity="0.1" />
    
    <!-- Inner faceted details -->
    <path d="M256 120 L 296 216 L 256 240 L 216 216 Z" fill="#ffffff" opacity="0.1" />
    <line x1="256" y1="60" x2="256" y2="452" stroke="#ffffff" stroke-width="1" opacity="0.4" />
  </g>
</svg>
